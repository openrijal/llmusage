name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: llmusage

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: contains(matrix.target, 'linux') && !matrix.use_cross
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple')
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Create tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="${BINARY_NAME}-${TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${BINARY_NAME} staging/
          cp LICENSE README.md staging/
          cd staging
          tar czf "../${ARCHIVE}" *
          cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/sha256sums.txt

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

      - name: Publish to crates.io
        # --allow-dirty lets publish tolerate the Cargo.lock diff that cargo's
        # own verify build regenerates during `cargo package`. The lockfile
        # committed to main is already fresh; without this flag publish fails
        # with "files in the working directory contain changes".
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: |
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "sha256sums.txt"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SHA-256 hashes
        id: sha
        run: |
          LINUX_X86=$(grep 'x86_64-unknown-linux-gnu.tar.gz' sha256sums.txt | awk '{print $1}')
          LINUX_ARM=$(grep 'aarch64-unknown-linux-gnu.tar.gz' sha256sums.txt | awk '{print $1}')
          MACOS_X86=$(grep 'x86_64-apple-darwin.tar.gz' sha256sums.txt | awk '{print $1}')
          MACOS_ARM=$(grep 'aarch64-apple-darwin.tar.gz' sha256sums.txt | awk '{print $1}')
          echo "linux_x86=${LINUX_X86}" >> "$GITHUB_OUTPUT"
          echo "linux_arm=${LINUX_ARM}" >> "$GITHUB_OUTPUT"
          echo "macos_x86=${MACOS_X86}" >> "$GITHUB_OUTPUT"
          echo "macos_arm=${MACOS_ARM}" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          cat > llmusage.rb << FORMULA
          class Llmusage < Formula
            desc "CLI tool to track and analyze LLM API usage across providers"
            homepage "https://github.com/openrijal/llmusage"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/llmusage-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_arm }}"
              else
                url "${BASE_URL}/llmusage-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_x86 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/llmusage-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm }}"
              else
                url "${BASE_URL}/llmusage-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_x86 }}"
              end
            end

            def install
              bin.install "llmusage"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/llmusage --version")
            end
          end
          FORMULA

      - name: Update Homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/openrijal/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp llmusage.rb tap/Formula/llmusage.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/llmusage.rb
          git commit -m "Update llmusage to ${{ steps.release.outputs.version }}"
          git push
