name: Security Audit

on:
  push:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  issues: write
  checks: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
