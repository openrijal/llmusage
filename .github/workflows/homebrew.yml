name: Update Homebrew Formula

on:
  release:
    types: [published]

jobs:
  homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: |
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "sha256sums.txt"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SHA-256 hashes
        id: sha
        run: |
          LINUX_X86=$(grep 'x86_64-unknown-linux-gnu.tar.gz' sha256sums.txt | awk '{print $1}')
          LINUX_MUSL=$(grep 'x86_64-unknown-linux-musl.tar.gz' sha256sums.txt | awk '{print $1}')
          LINUX_ARM=$(grep 'aarch64-unknown-linux-gnu.tar.gz' sha256sums.txt | awk '{print $1}')
          MACOS_X86=$(grep 'x86_64-apple-darwin.tar.gz' sha256sums.txt | awk '{print $1}')
          MACOS_ARM=$(grep 'aarch64-apple-darwin.tar.gz' sha256sums.txt | awk '{print $1}')
          echo "linux_x86=${LINUX_X86}" >> "$GITHUB_OUTPUT"
          echo "linux_musl=${LINUX_MUSL}" >> "$GITHUB_OUTPUT"
          echo "linux_arm=${LINUX_ARM}" >> "$GITHUB_OUTPUT"
          echo "macos_x86=${MACOS_X86}" >> "$GITHUB_OUTPUT"
          echo "macos_arm=${MACOS_ARM}" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          cat > llmusage.rb << 'FORMULA'
          class Llmusage < Formula
            desc "CLI tool to track and analyze LLM API usage across providers"
            homepage "https://github.com/openrijal/llmusage"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "BASE_URL_PLACEHOLDER/llmusage-TAG_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
                sha256 "MACOS_ARM_SHA_PLACEHOLDER"
              else
                url "BASE_URL_PLACEHOLDER/llmusage-TAG_PLACEHOLDER-x86_64-apple-darwin.tar.gz"
                sha256 "MACOS_X86_SHA_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "BASE_URL_PLACEHOLDER/llmusage-TAG_PLACEHOLDER-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "LINUX_ARM_SHA_PLACEHOLDER"
              else
                url "BASE_URL_PLACEHOLDER/llmusage-TAG_PLACEHOLDER-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "LINUX_X86_SHA_PLACEHOLDER"
              end
            end

            def install
              bin.install "llmusage"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/llmusage --version")
            end
          end
          FORMULA
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" llmusage.rb
          sed -i "s|BASE_URL_PLACEHOLDER|${BASE_URL}|g" llmusage.rb
          sed -i "s|TAG_PLACEHOLDER|${TAG}|g" llmusage.rb
          sed -i "s|MACOS_ARM_SHA_PLACEHOLDER|${{ steps.sha.outputs.macos_arm }}|g" llmusage.rb
          sed -i "s|MACOS_X86_SHA_PLACEHOLDER|${{ steps.sha.outputs.macos_x86 }}|g" llmusage.rb
          sed -i "s|LINUX_ARM_SHA_PLACEHOLDER|${{ steps.sha.outputs.linux_arm }}|g" llmusage.rb
          sed -i "s|LINUX_X86_SHA_PLACEHOLDER|${{ steps.sha.outputs.linux_x86 }}|g" llmusage.rb

      - name: Update Homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/openrijal/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp llmusage.rb tap/Formula/llmusage.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/llmusage.rb
          git commit -m "Update llmusage to ${{ steps.release.outputs.version }}"
          git push
